name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: json, mbstring, grpc, protobuf
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-8.2-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.2-
            ${{ runner.os }}-composer-

      - name: Validate release metadata
        run: |
          if ! printf '%s' "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag must be strict vX.Y.Z, got $GITHUB_REF_NAME" >&2
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          export TAG_VERSION
          php -r '
          require "src/Version.php";
          $expected = getenv("TAG_VERSION");
          if (Spooled\Version::VERSION !== $expected) {
              fwrite(STDERR, "Tag version {$expected} does not match Spooled\\Version::VERSION " . Spooled\Version::VERSION . PHP_EOL);
              exit(1);
          }
          '
          grep -E "^## \\[$TAG_VERSION\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install locked dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Verify lock file is unchanged
        run: git diff --exit-code -- composer.lock

      - name: Run PHPStan
        run: composer analyse

      - name: Check code style
        run: composer format:check

      - name: Run unit tests
        run: composer test

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          PREVIOUS_TAG="$(git describe --abbrev=0 --tags HEAD^ 2>/dev/null || true)"
          {
            echo "## Spooled PHP SDK v${{ steps.version.outputs.VERSION }}"
            echo
            echo "### Installation"
            echo
            echo '```bash'
            echo "composer require spooled-cloud/spooled"
            echo '```'
            echo
            echo "### Changes"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD
            else
              git log --pretty=format:"- %s (%h)" -n 10 HEAD
            fi
            echo
            echo
            echo "### Links"
            echo
            echo "- [Documentation](https://github.com/spooled-cloud/spooled-sdk-php#readme)"
            echo "- [Packagist](https://packagist.org/packages/spooled-cloud/spooled)"
            echo "- [API Reference](https://spooled.cloud/docs)"
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-packagist:
    name: Notify Packagist
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.PACKAGIST_USERNAME != '' }}

    steps:
      - name: Trigger Packagist update
        run: |
          curl -XPOST -H'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${{ vars.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -d'{"repository":{"url":"https://github.com/spooled-cloud/spooled-sdk-php"}}'
        continue-on-error: true
